services:
  # ── Rust ECS Game Engine ──────────────────────────────────────────────────
  rust-engine:
    build:
      context: ./engines/core-state
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - PYTHON_DIRECTOR_URL=http://python-director:8000
    depends_on:
      - redis-memory
    restart: unless-stopped

  # ── Python AI Director ────────────────────────────────────────────────────
  python-director:
    env_file:
      - .env
    build:
      context: ./apps/python-director
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/python-director:/app
      - /app/venv
      - ./apps/python-director/data:/app/data
      - audio_assets:/app/audio
      - generated_assets:/app/generated
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - RUST_ENGINE_URL=http://rust-engine:8080
      - REDIS_URL=redis://redis-memory:6379
      - SELF_URL=http://localhost:8000
      - AI_MODEL_MODE=${AI_MODEL_MODE:-}
      - COQUI_TOS_AGREED=1
      - AUDIO_DIR=/app/audio
      - GENERATED_DIR=/app/generated
      - USE_AWS_RAG=${USE_AWS_RAG:-false}
      - DEMO_MODE=${DEMO_MODE:-false}
      - OPENSEARCH_ENDPOINT=${OPENSEARCH_ENDPOINT:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_LORE_BUCKET=${S3_LORE_BUCKET:-}
    depends_on:
      - redis-memory
      - rust-engine
    restart: unless-stopped

  # ── Redis Vector DB (simulating AWS ElastiCache) ──────────────────────────
  redis-memory:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  audio_assets:
  generated_assets:
